services:
  fifa-mysql:
    image: mysql:8.0
    container_name: fifa-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    deploy:
      resources:
        limits:
          memory: 2g
    volumes:
      - fifa-mysql-data:/var/lib/mysql
    restart: unless-stopped

  fifa-api-runner:
    build:
      context: ./fifa-api-runner
    container_name: fifa-api-runner
    environment:
      RUNNER_TOKEN: ${RUNNER_TOKEN}
    depends_on:
      - fifa-mysql
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g

volumes:
  fifa-mysql-data:
